# --- 1. Puerto del servidor ---
server.port=8080

# --- 2. Identidad de la aplicación ---
spring.application.name=api-gateway

# --- Desactivar verificación estricta de versiones de Spring Cloud ---
spring.cloud.compatibility-verifier.enabled=false

# --- 3. Mapa de Rutas (Apuntando a los contenedores de Docker) ---

# Ruta para viajeros-service
spring.cloud.gateway.routes[0].id=viajeros-service
spring.cloud.gateway.routes[0].uri=http://viajeros_dev:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/viajeros/**

# Ruta para vehiculos-service
spring.cloud.gateway.routes[1].id=vehiculos-service
spring.cloud.gateway.routes[1].uri=http://vehiculos_dev:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/vehiculos/**

# Ruta para equipaje-service
spring.cloud.gateway.routes[2].id=equipaje-service
spring.cloud.gateway.routes[2].uri=http://equipaje_dev:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/equipajes/**

# Ruta para auditoria-service
spring.cloud.gateway.routes[3].id=auditoria-service
spring.cloud.gateway.routes[3].uri=http://auditoria_dev:8084
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/auditoria/**

# Ruta para auth-service
spring.cloud.gateway.routes[4].id=auth-service
spring.cloud.gateway.routes[4].uri=http://auth_dev:8085
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/auth/**

# Ruta para pdi-migraciones-service
spring.cloud.gateway.routes[5].id=pdi-migraciones-service
spring.cloud.gateway.routes[5].uri=http://pdi_dev:8086
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/pdi/**

# Ruta para integracion-internacional
spring.cloud.gateway.routes[6].id=integracion-internacional
spring.cloud.gateway.routes[6].uri=http://integracion_dev:8087
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/internacional/**

# Ruta para reportes-service
spring.cloud.gateway.routes[7].id=reportes-service
spring.cloud.gateway.routes[7].uri=http://reportes_dev:8088
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/reportes/**