# ============================================
# Microservicio: vehiculos-service
# ============================================

# --- 1. Identidad de la aplicación ---
spring.application.name=vehiculos-service

# --- 2. Puerto del servidor ---
# Spring escuchará en 8080 dentro del contenedor.
# El docker-compose lo mapea hacia afuera al puerto 8083 del host.
server.port=8080

# --- 3. Conexión a MySQL (db_vehiculos) ---
# 'db-vehiculos' es el nombre del servicio en docker-compose.yml.
# Docker lo resuelve como hostname dentro de la red 'red_aduana'.
spring.datasource.url=jdbc:mysql://db-vehiculos:3306/db_vehiculos?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- 4. JPA / Hibernate ---
# 'update' crea/actualiza las tablas automáticamente según tus @Entity.
# En producción conviene 'validate' o 'none'.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# --- 5. Pool de conexiones (opcional, recomendado en producción) ---
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000

# --- 6. Logging (opcional, ayuda a debuggear) ---
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
