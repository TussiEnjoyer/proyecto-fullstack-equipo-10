# ============================================
# Microservicio: auth-service
# ============================================

# --- 1. Identidad de la aplicación ---
spring.application.name=auth-service

# --- 2. Puerto del servidor ---
# Dentro del contenedor corre en 8080.
# Docker lo mapea hacia afuera al puerto 8081 del host.
server.port=8085

# --- 3. Conexión a MySQL (db_auth) ---
# 'db-auth' es el nombre del servicio en docker-compose.yml.
# Docker lo resuelve como hostname dentro de la red 'red_aduana'.
spring.datasource.url=jdbc:mysql://db-auth:3306/db_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- 4. JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# --- 5. Logging (opcional, ayuda a debuggear) ---
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
