# ============================================
# Microservicio: viajeros-service
# ============================================

# --- 1. Identidad de la aplicación ---
spring.application.name=viajeros-service

# --- 2. Puerto del servidor ---
# Cambiado a 8081 para desarrollo local directo sin Docker
server.port=8081

# --- 3. Conexión a MySQL (db_viajeros) ---
# Como el microservicio se ejecuta directamente en la EC2 (fuera de Docker),
# se usa 'localhost' como hostname para conectarse al MySQL local.
spring.datasource.url=jdbc:mysql://db-viajeros:3306/db_viajeros?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- 4. JPA / Hibernate ---
# 'update' crea/actualiza las tablas automáticamente según tus @Entity.
# En producción conviene 'validate' o 'none'.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# --- 5. Logging (opcional, ayuda a debuggear) ---
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

spring.cloud.compatibility-verifier.enabled=false