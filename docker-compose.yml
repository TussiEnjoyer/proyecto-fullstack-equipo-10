services:
  # --- 1. MÓDULO API GATEWAY ---
  db-gateway:
    image: mysql:8.0
    container_name: db_gateway
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: db_gateway
    ports: ["33060:3306"]
    networks: [red_aduana]

  ms-gateway:
    image: maven:3.9-eclipse-temurin-21
    container_name: gateway_dev
    ports: ["8080:8080"]
    depends_on: [db-gateway]
    volumes: ["./api-gateway/codigo_fuente:/app"]
    command: tail -f /dev/null
    networks: [red_aduana]
    working_dir: /app

  # --- 2. MÓDULO AUTH ---
  db-auth:
    image: mysql:8.0
    container_name: db_auth
